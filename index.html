<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thử Thách Môi Trường 100</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #e8f5e9; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; cursor: pointer; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; font-weight: bold; background: #fff; transition: 0.2s; }
        .btn:hover { background: #4caf50; color: white; border-color: #4caf50; }
        #timer { font-size: 28px; color: #f44336; font-weight: bold; margin: 10px 0; }
        .stats { display: flex; justify-content: space-around; font-weight: bold; color: #2e7d32; margin-bottom: 20px; }
        input { padding: 15px; width: 80%; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🌱 CHIẾN BINH MÔI TRƯỜNG</h1>
        <div id="setup">
            <input type="text" id="username" placeholder="Nhập tên của bạn...">
            <button class="btn" style="background:#4caf50; color:white;" onclick="startGame()">BẮT ĐẦU THỬ THÁCH</button>
        </div>

        <div id="game" style="display:none;">
            <div class="stats">
                <div>Câu: <span id="q-num">1</span>/20</div>
                <div>Điểm: <span id="score">0</span></div>
                <div>Chuỗi: <span id="streak">0</span> 🔥</div>
            </div>
            <div id="timer">00:00</div>
            <h2 id="q-text">Đang tải...</h2>
            <div id="options"></div>
        </div>

        <div id="result" style="display:none;">
            <h2>KẾT QUẢ TRẬN ĐẤU</h2>
            <p id="final-stats"></p>
            <div id="lb" style="text-align:left; background:#f1f8e9; padding:15px; border-radius:10px; line-height: 1.6;"></div>
            <button class="btn" onclick="location.reload()">CHƠI LẠI</button>
        </div>
    </div>

    <script>
        let questions = [], currentIdx = 0, score = 0, streak = 0, startTime, timerInterval, name = "";

        async function startGame() {
            name = document.getElementById('username').value;
            if(!name) return alert("Bạn chưa nhập tên!");
            const res = await fetch('/get_questions');
            const data = await res.json();
            questions = data.questions;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            showQuestion();
        }

        function updateTimer() {
            let diff = Math.floor((Date.now() - startTime) / 1000);
            let m = Math.floor(diff / 60).toString().padStart(2, '0');
            let s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }

        function showQuestion() {
            if(currentIdx >= 20) return endGame();
            const q = questions[currentIdx];
            document.getElementById('q-num').innerText = currentIdx + 1;
            document.getElementById('q-text').innerText = q.q;
            let html = "";
            q.a.forEach((opt, i) => {
                html += `<button class="btn" onclick="checkAns(${i})">${opt}</button>`;
            });
            document.getElementById('options').innerHTML = html;
        }

        function checkAns(idx) {
            if(idx === questions[currentIdx].c) {
                streak++;
                score += 10 + (streak * 2);
            } else {
                streak = 0;
            }
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;
            currentIdx++;
            showQuestion();
        }

        async function endGame() {
            clearInterval(timerInterval);
            const totalTime = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('game').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            
            const res = await fetch('/submit_score', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name, score: score, time: totalTime})
            });
            const data = await res.json();
            document.getElementById('final-stats').innerText = `Chúc mừng ${name}! Bạn đạt ${score} điểm trong ${totalTime} giây.`;
            let lbHtml = "<b>🏆 BẢNG XẾP HẠNG TOP 10</b><br>";
            data.leaderboard.forEach((e, i) => lbHtml += `${i+1}. ${e.name} - ${e.score}đ (${e.time}s)<br>`);
            document.getElementById('lb').innerHTML = lbHtml;
        }
    </script>
</body>
</html>
